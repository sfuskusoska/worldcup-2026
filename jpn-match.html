<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本戦応援 - ワールドカップ 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="back-link">← ダッシュボードへ</a>
    <h1>🇯🇵 日本 vs オランダ</h1>
    <div id="kickoff-info">6月15日(月) 5:00 キックオフ</div>
  </header>

  <main id="app">

    <!-- ログイン画面 -->
    <section id="login-screen">
      <h2>参加するには</h2>
      <form id="login-form" onsubmit="return false;">
        <label>
          ニックネーム
          <input type="text" id="nickname-input" maxlength="20" required>
        </label>
        <label>
          合言葉
          <input type="password" id="passphrase-input" required>
        </label>
        <button type="submit" id="login-button">参加する</button>
      </form>
      <p id="login-error" class="error-message" hidden></p>
    </section>

    <!-- 試合前：予想画面 -->
    <section id="pre-match-screen" hidden>

      <div class="prediction-form-card">
        <h2>スコア予想</h2>
        <p id="lock-notice" class="lock-notice" hidden>キックオフ5分前のため予想はロックされました</p>

        <form id="prediction-form">
          <div class="score-inputs">
            <div class="score-team">
              <span class="team-label">🇯🇵 日本</span>
              <input type="number" id="score-home" min="0" max="9" value="1" required>
            </div>
            <span class="score-sep">−</span>
            <div class="score-team">
              <input type="number" id="score-away" min="0" max="9" value="0" required>
              <span class="team-label">🇳🇱 オランダ</span>
            </div>
          </div>

          <div class="first-scorer-row">
            <label for="first-scorer">最初の得点者（任意）</label>
            <select id="first-scorer">
              <option value="">選択しない</option>
            </select>
          </div>

          <button type="submit" id="prediction-submit">予想を送る</button>
        </form>
        <p id="prediction-message" class="prediction-message" hidden></p>
      </div>

      <div class="results-card">
        <h2>みんなの予想 <span id="vote-count" class="vote-count"></span></h2>
        <div id="chart-container">
          <canvas id="prediction-chart"></canvas>
        </div>
        <div id="prediction-list" class="prediction-list"></div>
      </div>

    </section>

    <!-- 試合中：応援画面 -->
    <section id="live-screen" hidden>

      <div class="card card-primary live-score-card">
        <div class="live-badge">🔴 LIVE</div>
        <div class="live-score-row">
          <span class="live-team">🇯🇵 日本</span>
          <span class="live-score-nums">
            <span id="live-score-home">-</span>
            <span class="live-colon">:</span>
            <span id="live-score-away">-</span>
          </span>
          <span class="live-team">🇳🇱 オランダ</span>
        </div>
        <div id="live-minute" class="live-minute"></div>
      </div>

      <div class="card reaction-card">
        <h2>応援しよう！</h2>
        <div class="reaction-buttons">
          <button class="reaction-btn" data-reaction="goal">⚽<br><span>ゴール！</span></button>
          <button class="reaction-btn" data-reaction="close">😣<br><span>惜しい！</span></button>
          <button class="reaction-btn" data-reaction="amazing">🔥<br><span>すごい！</span></button>
          <button class="reaction-btn" data-reaction="foul">😡<br><span>ファウル！</span></button>
        </div>
      </div>

      <div class="card stream-card">
        <h2>みんなの声</h2>
        <div id="reaction-stream" class="reaction-stream"></div>
      </div>

    </section>

    <!-- 試合後：ランキング画面 -->
    <section id="post-match-screen" hidden>

      <div class="card card-primary final-result-card">
        <h2>試合終了</h2>
        <div class="final-score-row">
          <span class="final-team">🇯🇵 日本</span>
          <span class="final-score-nums">
            <span id="final-home">-</span>
            <span>−</span>
            <span id="final-away">-</span>
          </span>
          <span class="final-team">🇳🇱 オランダ</span>
        </div>
        <div id="first-scorer-result" class="first-scorer-result"></div>
      </div>

      <div class="card ranking-card">
        <h2>🏆 予想ランキング</h2>
        <div class="points-legend">
          <span>完全一致 5pt</span>
          <span>勝敗一致 2pt</span>
          <span>得点者一致 +3pt</span>
        </div>
        <div id="ranking-list" class="ranking-list"></div>
      </div>

    </section>

    <!-- 管理者パネル（URL に ?admin=1 を付けると表示） -->
    <div id="admin-panel" class="card admin-panel" hidden>
      <h2>⚙️ 管理者パネル</h2>

      <div class="admin-row">
        <label>試合ステータス</label>
        <select id="admin-status">
          <option value="pre">試合前 (pre)</option>
          <option value="live">試合中 (live)</option>
          <option value="post">試合後 (post)</option>
        </select>
        <button id="admin-status-btn" class="admin-btn">更新</button>
      </div>

      <div class="admin-row">
        <label>ライブスコア</label>
        <input type="number" id="admin-live-home" min="0" max="9" placeholder="日本" class="admin-score-input">
        <span>−</span>
        <input type="number" id="admin-live-away" min="0" max="9" placeholder="相手" class="admin-score-input">
        <input type="number" id="admin-live-minute" min="1" max="120" placeholder="分" class="admin-score-input">
        <button id="admin-live-btn" class="admin-btn">スコア更新</button>
      </div>

      <div class="admin-row">
        <label>最終結果</label>
        <input type="number" id="admin-final-home" min="0" max="9" placeholder="日本" class="admin-score-input">
        <span>−</span>
        <input type="number" id="admin-final-away" min="0" max="9" placeholder="相手" class="admin-score-input">
        <select id="admin-first-scorer" class="admin-scorer-select">
          <option value="">得点者なし</option>
        </select>
        <button id="admin-final-btn" class="admin-btn">結果確定</button>
      </div>

      <p id="admin-message" class="admin-message"></p>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="jpn-match.js"></script>
</body>
</html>
