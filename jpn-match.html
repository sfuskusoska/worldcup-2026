<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本戦応援 - ワールドカップ 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="back-link">← ダッシュボードへ</a>
    <h1>🇯🇵 日本 vs オランダ</h1>
    <div id="kickoff-info">6月15日(月) 5:00 キックオフ</div>
  </header>

  <main id="app">

    <!-- ログイン画面 -->
    <section id="login-screen">
      <h2>参加するには</h2>
      <form id="login-form" onsubmit="return false;">
        <label>
          ニックネーム
          <input type="text" id="nickname-input" maxlength="20" required>
        </label>
        <label>
          合言葉
          <input type="password" id="passphrase-input" required>
        </label>
        <button type="submit" id="login-button">参加する</button>
      </form>
      <p id="login-error" class="error-message" hidden></p>
    </section>

    <!-- 試合前：予想画面 -->
    <section id="pre-match-screen" hidden>

      <div class="prediction-form-card">
        <h2>スコア予想</h2>
        <p id="lock-notice" class="lock-notice" hidden>キックオフ5分前のため予想はロックされました</p>

        <form id="prediction-form">
          <div class="score-inputs">
            <div class="score-team">
              <span class="team-label">🇯🇵 日本</span>
              <input type="number" id="score-home" min="0" max="9" value="1" required>
            </div>
            <span class="score-sep">−</span>
            <div class="score-team">
              <input type="number" id="score-away" min="0" max="9" value="0" required>
              <span class="team-label">🇳🇱 オランダ</span>
            </div>
          </div>

          <div class="first-scorer-row">
            <label for="first-scorer">最初の得点者（任意）</label>
            <select id="first-scorer">
              <option value="">選択しない</option>
            </select>
          </div>

          <button type="submit" id="prediction-submit">予想を送る</button>
        </form>
        <p id="prediction-message" class="prediction-message" hidden></p>
      </div>

      <div class="results-card">
        <h2>みんなの予想 <span id="vote-count" class="vote-count"></span></h2>
        <div id="chart-container">
          <canvas id="prediction-chart"></canvas>
        </div>
        <div id="prediction-list" class="prediction-list"></div>
      </div>

    </section>

    <!-- 試合中：感情ボタン画面（Week 3で実装） -->
    <section id="live-screen" hidden>
      <h2>応援中</h2>
      <p>Week 3で実装します</p>
    </section>

    <!-- 試合後：ランキング画面（Week 3で実装） -->
    <section id="post-match-screen" hidden>
      <h2>試合終了</h2>
      <p>Week 3で実装します</p>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="jpn-match.js"></script>
</body>
</html>
